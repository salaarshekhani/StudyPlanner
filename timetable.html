<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="state.js"></script>
    <script src="effects.js"></script>
</head>
<body>

<nav>
    <a href="index.html" class="brand">StudyPlanner</a>
    <div class="nav-links">
        <a href="index.html">Overview</a>
        <a href="subjects.html">Subjects</a>
        <a href="timetable.html" class="active">Timetable</a>
        <a href="pomodoro.html">Pomodoro</a>
        <a href="todo.html">To-Do</a>
        <a href="about.html">About</a>
    </div>
    <div class="nav-right">
        <button id="theme-toggle" class="btn btn-remove" aria-label="Toggle theme">🌓</button>
        <a id="account-btn" class="btn btn-remove" href="account.html" aria-label="Account">Account</a>
    </div>
</nav>

<div class="container">
    <h1>Timetable</h1>
    <p class="page-subtitle">Auto-generated weekly schedule. Click a session to mark it complete.</p>

    <div id="page-content"></div>
</div>

<script>
var SESSIONS_PER_WEEK = { Easy:1, Medium:2, Hard:3 };
var SESSION_DAY_MAP   = { 1:[3], 2:[1,4], 3:[1,3,5] };
var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getState() {
    if (window.SP) return window.SP.getState();
    try { var r=localStorage.getItem('sp_v1'); if(r) return JSON.parse(r); } catch(e) {}
    return { subjects:[], completedSessions:{}, pomodoroLog:{}, todos:{}, weekOffset:0, selectedSubject:null, pomoConfig:{focus:25,short:5,long:15} };
}
function saveState(s) {
    if (window.SP) {
        window.SP.saveState(s);
    } else {
        try { localStorage.setItem('sp_v1', JSON.stringify(s)); }
        catch(e) { alert('Could not save: localStorage may be full or disabled.'); }
    }
}
function daysUntil(d) {
    var t=new Date(); t.setHours(0,0,0,0);
    var x=new Date(d); x.setHours(0,0,0,0);
    return Math.max(0, Math.ceil((x-t)/86400000));
}
function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function weekStartFor(off) {
    var d=new Date(); d.setDate(d.getDate()-d.getDay()+off*7); d.setHours(0,0,0,0); return d;
}
function buildSchedule(ws, subjects) {
    var sch={};
    for (var i=0;i<7;i++){var d=new Date(ws);d.setDate(ws.getDate()+i);sch[d.toDateString()]=[];}
    subjects.forEach(function(s){
        var exam=new Date(s.examDate); exam.setHours(0,0,0,0);
        SESSION_DAY_MAP[SESSIONS_PER_WEEK[s.difficulty]].forEach(function(di){
            var d=new Date(ws); d.setDate(ws.getDate()+di); d.setHours(0,0,0,0);
            if(d<=exam) sch[d.toDateString()].push(s);
        });
    });
    return sch;
}
function emptyStateNotice(msg) {
    return '<div class="notice-box"><p>'+msg+'</p></div>';
}

var S = getState();

function render() {
    var pc = document.getElementById('page-content');

    if (!S.subjects.length) {
        pc.innerHTML = emptyStateNotice('No subjects found. <a href="subjects.html">Add subjects first</a> to generate a timetable.');
        return;
    }

    var ws  = weekStartFor(S.weekOffset);
    var we  = new Date(ws); we.setDate(ws.getDate()+6);
    var sch = buildSchedule(ws, S.subjects);
    var today = new Date(); today.setHours(0,0,0,0);

    var grid = '';
    for (var i=0; i<7; i++) {
        var d       = new Date(ws); d.setDate(ws.getDate()+i);
        var isToday = d.getTime()===today.getTime();
        var ds      = d.toDateString();
        var sess    = sch[ds]||[];

        var pills = sess.length ? sess.map(function(s){
            var done = (S.completedSessions[s.id]||[]).indexOf(ds)>-1;
            return '<span class="tt-pill'+(done?' done':'')+'" '+
                'style="background:'+s.color+'22;color:'+s.color+';border-color:'+s.color+'44;" '+
                'onclick="toggleSession(\''+s.id+'\',\''+ds+'\')" '+
                'title="'+s.name+' - click to toggle">'+s.name+'</span>';
        }).join('') : '<div class="tt-rest">Rest</div>';

        grid +=
            '<div class="tt-col">'+
            '<div class="tt-day-head">'+DAYS[i]+'</div>'+
            '<div class="tt-day-num'+(isToday?' today':'')+'">'+(d.getDate())+'</div>'+
            pills+
            '</div>';
    }

    var legend = S.subjects.map(function(s){
        return '<span style="display:inline-flex;align-items:center;gap:5px;font-size:0.82rem;">'+
            '<span class="dot" style="background:'+s.color+'"></span>'+s.name+'</span>';
    }).join('');

    pc.innerHTML =
        '<div class="card">'+
        '<div class="week-nav">'+
        '<button class="btn btn-small" onclick="changeWeek(-1)">&#8592; Previous</button>'+
        '<span class="week-label">'+fmtDate(ws.toISOString().split('T')[0])+' - '+fmtDate(we.toISOString().split('T')[0])+'</span>'+
        '<button class="btn btn-small" onclick="changeWeek(1)">Next &#8594;</button>'+
        '</div>'+
        '<div class="tt-grid">'+grid+'</div>'+
        '<p style="font-size:0.78rem;color:#888;margin-top:0.75rem;">Easy = 1 session/week &nbsp;|&nbsp; Medium = 2 &nbsp;|&nbsp; Hard = 3. Sessions stop after exam date.</p>'+
        '</div>'+
        '<div class="card"><div class="card-title">Legend</div><div style="display:flex;flex-wrap:wrap;gap:0.6rem;">'+legend+'</div></div>';
}

function toggleSession(subjectId, dateStr) {
    var arr = S.completedSessions[subjectId]||[];
    var idx = arr.indexOf(dateStr);
    if (idx>-1) arr.splice(idx,1); else arr.push(dateStr);
    S.completedSessions[subjectId] = arr;
    saveState(S); render();
}

function changeWeek(dir) {
    S.weekOffset += dir; saveState(S); render();
}

render();
if (window.SP) {
    window.onRemoteStateLoaded = function() {
        S = window.SP.getState();
        render();
    };
}
</script>
<footer>Made by <span>Salaar Adnan Shekhani</span></footer>

<script src="auth.js"></script>
</body>
</html>
