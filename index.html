<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPlanner - Overview</title>
    <link class="icon" href="images/favicon.svg" type="image/svg+xml">
    <script>(function(){try{var t=localStorage.getItem('sp_theme'); if(t) document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="stylesheet" href="style.css">
    <script src="state.js"></script>
    <script src="effects.js"></script>
</head>
<body>

<nav>
    <a href="index.html" class="brand">StudyPlanner</a>
    <div class="nav-links">
        <a href="index.html" class="active">Overview</a>
        <a href="subjects.html">Subjects</a>
        <a href="timetable.html">Timetable</a>
        <a href="pomodoro.html">Pomodoro</a>
        <a href="todo.html">To-Do</a>
        <a href="about.html">About</a>
    </div>
    <div class="nav-right">
        <button id="theme-toggle" class="btn btn-remove" aria-label="Toggle theme">🌓</button>
        <a id="account-btn" class="btn btn-remove" href="account.html" aria-label="Account">Account</a>
    </div>
</nav>

<div class="container">
    <h1>Overview</h1>
    <p class="page-subtitle">Your revision summary at a glance.</p>

    <div class="stat-row" id="stat-row"></div>

    <div class="card">
        <div class="card-title">Exam Countdowns</div>
        <div id="countdown-list"></div>
    </div>
</div>

<script>
/* ---- shared ---- */
function getState() {
    if (window.SP) return window.SP.getState();
    try { var r = localStorage.getItem('sp_v1'); if (r) return JSON.parse(r); } catch(e) {}
    return { subjects:[], completedSessions:{}, pomodoroLog:{}, todos:{}, weekOffset:0, selectedSubject:null, pomoConfig:{focus:25,short:5,long:15} };
}
function daysUntil(d) {
    var t=new Date(); t.setHours(0,0,0,0);
    var x=new Date(d); x.setHours(0,0,0,0);
    return Math.max(0, Math.ceil((x-t)/86400000));
}
function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function emptyStateNotice(msg) {
    return '<div class="notice-box"><p>'+msg+'</p></div>';
}

/* ---- page ---- */
var S = getState();

/* stats */
var allTasks=[], done=0, pomos=0;
for (var k in S.todos) S.todos[k].forEach(function(t){ allTasks.push(t); if(t.done) done++; });
for (var k in S.pomodoroLog) pomos += S.pomodoroLog[k];

document.getElementById('stat-row').innerHTML =
    '<div class="stat-box"><div class="num">'+S.subjects.length+'</div><div class="lbl">Subjects</div><div class="sub">being tracked</div></div>' +
    '<div class="stat-box"><div class="num">'+done+'<span style="font-size:1rem;color:#888">/'+allTasks.length+'</span></div><div class="lbl">Tasks Done</div><div class="sub">'+(allTasks.length-done)+' remaining</div></div>' +
    '<div class="stat-box"><div class="num">'+pomos+'</div><div class="lbl">Pomodoros</div><div class="sub">'+(pomos*25)+' min of focus</div></div>';

/* countdowns */
var cl = document.getElementById('countdown-list');
if (!S.subjects.length) {
    cl.innerHTML = emptyStateNotice('No subjects yet. <a href="subjects.html">Add some</a> to see countdowns.');
} else {
    var sorted = S.subjects.slice().sort(function(a,b){ return new Date(a.examDate)-new Date(b.examDate); });
    cl.innerHTML = sorted.map(function(s){
        var days = daysUntil(s.examDate);
        return '<div class="countdown-item">'+
            '<div class="countdown-left">'+
            '<span class="dot" style="background:'+s.color+'"></span>'+
            '<div><div class="countdown-name">'+s.name+'</div><div class="countdown-date">'+fmtDate(s.examDate)+'</div></div>'+
            '</div>'+
            '<span class="countdown-days'+(days<=7?' urgent':'')+'">'+days+'d</span>'+
            '</div>';
    }).join('');
}
</script>
<footer>Made by <span>Salaar Adnan Shekhani</span></footer>
<script src="theme-toggle.js"></script>
<script src="auth.js"></script>
</body>
</html>
