<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPlanner - Account</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <script>(function(){try{var t=localStorage.getItem('sp_theme'); if(t) document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="stylesheet" href="style.css">
    <script src="state.js"></script>
    <script src="effects.js"></script>
</head>
<body>

<nav>
    <a href="index.html" class="brand">StudyPlanner</a>
    <div class="nav-links">
        <a href="index.html">Overview</a>
        <a href="subjects.html">Subjects</a>
        <a href="timetable.html">Timetable</a>
        <a href="pomodoro.html">Pomodoro</a>
        <a href="todo.html">To-Do</a>
        <a href="about.html">About</a>
    </div>
    <div class="nav-right">
        <button id="theme-toggle" class="btn btn-remove" aria-label="Toggle theme">🌓</button>
        <a id="account-btn" class="btn btn-remove" href="account.html" aria-label="Account">Account</a>
    </div>
</nav>

<div class="container">
    <h1>Account</h1>
    <p class="page-subtitle">Register a new account or log in.</p>

    <div class="card">
        <div class="card-title">Sign In</div>
        <form id="login-form">
            <div class="form-row">
                <div class="field">
                    <label for="login-username">Username</label>
                    <input id="login-username" type="text" autocomplete="off">
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input id="login-password" type="password" autocomplete="off">
                </div>
                <div class="field" style="align-self:flex-end;">
                    <button class="btn btn-primary" type="submit">Log In</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="card-title">Register</div>
        <form id="register-form">
            <div class="form-row">
                <div class="field">
                    <label for="reg-username">Username</label>
                    <input id="reg-username" type="text" autocomplete="off">
                </div>
                <div class="field">
                    <label for="reg-password">Password</label>
                    <input id="reg-password" type="password" autocomplete="off">
                </div>
                <div class="field" style="align-self:flex-end;">
                    <button class="btn" type="submit">Register</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="card-title">Current User</div>
        <div id="current-user">Not signed in</div>
        <button id="logout-button" class="btn btn-remove" style="margin-top:1rem;">Log Out</button>
    </div>
</div>

<footer>Made by <span>Salaar Adnan Shekhani</span></footer>
<script src="theme-toggle.js"></script>
<script src="auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
    function refresh(){ var cu = window.auth.current(); document.getElementById('current-user').textContent = cu || 'Not signed in'; }
    refresh();

    document.getElementById('login-form').addEventListener('submit', async function(e){
        e.preventDefault();
        var u = document.getElementById('login-username').value.trim();
        var p = document.getElementById('login-password').value;
        if(!u || !p){ alert('Enter username and password'); return; }
        var r = await window.auth.login(u,p);
        if(!r.ok) { alert(r.msg || 'Login failed'); }
        else { alert('Logged in'); refresh(); window.location.href='index.html'; }
    });

    document.getElementById('register-form').addEventListener('submit', async function(e){
        e.preventDefault();
        var u = document.getElementById('reg-username').value.trim();
        var p = document.getElementById('reg-password').value;
        if(!u || !p){ alert('Enter username and password'); return; }
        var r = await window.auth.register(u,p);
        if(!r.ok){ alert(r.msg || 'Register failed'); }
        else { alert('Registered and signed in'); refresh(); window.location.href='index.html'; }
    });

    document.getElementById('logout-button').addEventListener('click', function(){
        window.auth.logout();
        refresh();
        alert('Logged out');
    });
});
</script>
</body>
</html>
